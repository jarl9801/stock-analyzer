<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLOOMBERG TERMINAL — Stock Analyzer Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/terminal.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
    <div id="terminal-root">
        <!-- Top Ticker Bar -->
        <div id="ticker-bar" class="ticker-bar">
            <div class="ticker-scroll" id="ticker-scroll"></div>
        </div>

        <!-- Command Bar -->
        <div id="command-bar" class="command-bar">
            <div class="command-bar-left">
                <span class="bb-logo">BLOOMBERG</span>
                <span class="bb-separator">|</span>
                <span class="bb-label">STOCK ANALYZER PRO</span>
            </div>
            <div class="command-bar-center">
                <div class="command-input-wrap">
                    <input type="text" id="command-input" class="command-input" placeholder="Enter command: AAPL <GO> or DES, FA, GP, PORT, WL, SCAN, NEWS, MOST, HMAP..." spellcheck="false" autocomplete="off">
                    <button id="go-btn" class="go-btn">GO</button>
                </div>
                <div id="autocomplete-dropdown" class="autocomplete-dropdown"></div>
            </div>
            <div class="command-bar-right">
                <span id="bb-date" class="bb-info"></span>
                <span id="bb-clock" class="bb-clock"></span>
            </div>
        </div>

        <!-- Function Key Bar -->
        <div class="fn-bar">
            <div class="fn-key" data-cmd="DES"><span class="fn-label">F1</span><span class="fn-text">DES</span></div>
            <div class="fn-key" data-cmd="GP"><span class="fn-label">F2</span><span class="fn-text">GP</span></div>
            <div class="fn-key" data-cmd="FA"><span class="fn-label">F3</span><span class="fn-text">FA</span></div>
            <div class="fn-key" data-cmd="PORT"><span class="fn-label">F4</span><span class="fn-text">PORT</span></div>
            <div class="fn-key" data-cmd="WL"><span class="fn-label">F5</span><span class="fn-text">WL</span></div>
            <div class="fn-key" data-cmd="SCAN"><span class="fn-label">F6</span><span class="fn-text">SCAN</span></div>
            <div class="fn-key" data-cmd="NEWS"><span class="fn-label">F7</span><span class="fn-text">NEWS</span></div>
            <div class="fn-key" data-cmd="MOST"><span class="fn-label">F8</span><span class="fn-text">MOST</span></div>
            <div class="fn-key" data-cmd="ALERTS"><span class="fn-label">F9</span><span class="fn-text">ALERTS</span></div>
            <div class="fn-key" data-cmd="HMAP"><span class="fn-label">F10</span><span class="fn-text">HMAP</span></div>
            <div class="fn-key" data-cmd="COMP"><span class="fn-label">F11</span><span class="fn-text">COMP</span></div>
            <div class="fn-key" data-cmd="HELP"><span class="fn-label">F12</span><span class="fn-text">HELP</span></div>
        </div>

        <!-- Panel Container -->
        <div id="panel-container" class="panel-container">
            <div class="panel active-panel" id="panel-1" data-panel="1">
                <div class="panel-header">
                    <div class="panel-tabs" id="panel-1-tabs">
                        <span class="panel-tab active" data-view="home">HOME</span>
                    </div>
                    <div class="panel-controls">
                        <button class="panel-btn" onclick="Panels.split()" title="Split panels">⊞</button>
                        <button class="panel-btn" onclick="Panels.maximize(1)" title="Maximize">⬜</button>
                    </div>
                </div>
                <div class="panel-content" id="panel-1-content"></div>
            </div>
        </div>

        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-left">
                <span class="status-indicator" id="status-connection">● CONNECTED</span>
                <span class="status-sep">|</span>
                <span id="status-market-state">MARKET CLOSED</span>
                <span class="status-sep">|</span>
                <span id="status-active-ticker">NO SECURITY</span>
            </div>
            <div class="status-center">
                <span id="status-alerts-count">0 ALERTS</span>
                <span class="status-sep">|</span>
                <span id="status-last-update">--</span>
            </div>
            <div class="status-right">
                <span>PANELS: <span id="status-panel-count">1</span></span>
                <span class="status-sep">|</span>
                <span id="status-version">SAP v3.0</span>
                <span class="status-sep">|</span>
                <span id="status-clock"></span>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/yahoo-proxy.js"></script>
    <script src="js/data-fetcher.js"></script>
    <script src="js/data-service.js"></script>
    <script src="js/ticker-bar.js"></script>
    <script src="js/command-bar.js"></script>
    <script src="js/panels.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/heatmap.js"></script>
    <script src="js/news.js"></script>
    <script src="js/watchlist.js"></script>
    <script src="js/portfolio-terminal.js"></script>
    <script src="js/screener.js"></script>
    <script src="js/security.js"></script>
    <script src="js/financials.js"></script>
    <script src="js/alerts.js"></script>
    <script src="js/terminal.js"></script>
</body>
</html>
